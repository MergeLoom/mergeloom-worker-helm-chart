# Optional. Override the short chart name used in Kubernetes object labels/names.
nameOverride: ""

# Optional. Override the full Kubernetes object name. Leave blank for the Helm release name plus chart name.
fullnameOverride: ""

# Worker container image settings. Defaults to the public MergeLoom worker image.
image:
  # Optional. Docker image repository for the MergeLoom worker.
  repository: mergeloom/mergeloom
  # Optional. Image tag to deploy. `1.0` tracks the supported 1.0 release line.
  tag: "1.0"
  # Optional. Kubernetes image pull policy. `Always` keeps mutable tags such as `1.0` current.
  pullPolicy: Always

# Worker gateway deployment settings.
gateway:
  # Optional. Number of gateway pods. Keep this at 1; executors scale job capacity separately.
  replicaCount: 1

# Worker executor settings.
executors:
  # Optional. Number of executor pods that can claim and run jobs.
  replicaCount: 1

# Internal gateway service settings.
service:
  # Optional. Service type for the worker gateway. `ClusterIP` is recommended.
  type: ClusterIP
  # Optional. Internal service port for the worker gateway UI/API.
  port: 8010

# Kubernetes service account settings for cloud workload identity.
# Required only when your cluster uses GKE Workload Identity Federation, EKS IRSA,
# AKS Workload Identity, or another pod-identity integration.
serviceAccount:
  # Optional. Create a service account for the gateway and executor pods.
  create: false
  # Optional. Existing service account name to use, or the created service account name.
  name: ""
  # Optional. Service account annotations for your cloud identity integration.
  # Examples:
  # iam.gke.io/gcp-service-account: worker-sa@project.iam.gserviceaccount.com
  # eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/mergeloom-worker
  # azure.workload.identity/client-id: 00000000-0000-0000-0000-000000000000
  annotations: {}
  # Optional. Keep enabled for cloud workload identity token projection.
  automountServiceAccountToken: true

# Optional. Extra labels added to gateway and executor pod templates.
# AKS Workload Identity usually requires:
# azure.workload.identity/use: "true"
podLabels: {}

# Optional. Extra annotations added to gateway and executor pod templates.
podAnnotations: {}

# MergeLoom worker registration and runtime controls.
worker:
  # Required. MergeLoom controller URL. Override only if MergeLoom support gives you a different URL.
  controlPlaneUrl: "https://controller.mergeloom.ai"
  # Required. Customer workspace slug from the MergeLoom controller.
  tenantSlug: "demo"
  # Required unless supplied by secret.existingSecretName. Enrollment token generated in the MergeLoom controller.
  enrollmentToken: ""
  # Optional. Shared token for gateway/executor coordination. If blank, the chart generates one and reuses it on upgrade.
  clusterToken: ""
  # Optional. Comma-separated allowlist of shell commands the worker may execute during jobs.
  allowedCommands: "git,rg,pytest,python,python3"
  # Optional. Shared database URL for all worker stores. Leave blank to use the chart-managed Postgres service.
  # To use RDS, Cloud SQL, Azure Database for PostgreSQL, or another managed Postgres service,
  # set this and set postgres.enabled=false. If secret.existingSecretName is set, put
  # JCA_WORKER_DATABASE_URL in that Secret instead.
  databaseUrl: ""
  # Optional. Advanced per-store database URLs. Leave blank to use worker.databaseUrl.
  configDatabaseUrl: ""
  auditDatabaseUrl: ""
  codeAuditDatabaseUrl: ""
  liveDatabaseUrl: ""
  traceDatabaseUrl: ""
  gatewayDatabaseUrl: ""
  # Optional. Number of executor repair attempts before a job is marked failed.
  maxRepairAttempts: 2
  # Optional. Per-command timeout in seconds.
  commandTimeoutSeconds: 300
  # Optional. Timeout in seconds for control-plane HTTP requests.
  controlPlaneRequestTimeoutSeconds: 60
  # Optional. Heartbeat interval in seconds while a job is actively running.
  activeJobHeartbeatIntervalSeconds: 15

# Reserved provider configuration defaults.
# Current chart templates run the gateway in UI-managed mode and executors read provider config from the gateway.
# These values are not required for normal installs and are kept for forward compatibility.
providerConfig:
  # Optional/reserved. Future provider configuration mode.
  mode: "provisioned"
  # Optional/reserved. Future provenance label for provider settings.
  provenance: "helm"
  # Optional/reserved. Future SQLite path for provider configuration state.
  dbPath: "/data/worker/provider_config.db"
  # Optional/reserved. Future local encryption key path for provider secrets.
  secretKeyPath: "/data/worker/provider_secret.key"

# Reserved runtime configuration defaults.
# Current chart templates run the gateway in UI-managed mode and executors read runtime config from the gateway.
# These values are not required for normal installs and are kept for forward compatibility.
runtimeConfig:
  # Optional/reserved. Future runtime configuration mode.
  mode: "provisioned"
  # Optional/reserved. Future provenance label for runtime settings.
  provenance: "helm"
  # Optional/reserved. Future SQLite path for runtime configuration state.
  dbPath: "/data/worker/runtime_config.db"

# Context Engine runs beside the self-hosted worker. It builds a private vault
# from repositories and serves token-efficient snippets to worker runs.
contextEngine:
  # Optional. Deploy Context Engine for this self-hosted worker installation.
  enabled: true
  # Optional. Override the Context Engine image. Defaults to the worker image.
  image:
    repository: ""
    tag: ""
    pullPolicy: ""
  # Optional. Shared database URL. Leave blank to use worker.databaseUrl / chart Postgres.
  databaseUrl: ""
  # Optional. Request timeout for Context Engine API calls.
  requestTimeoutSeconds: 30
  # Optional. Embedding provider. local_hashing is free/local; OpenAI is opt-in.
  embeddingProvider: "local_hashing"
  embeddingModel: "text-embedding-3-small"
  embeddingIndexTokenLimit: 0
  embeddingQueryTokenLimit: 0
  embeddingRequestTimeoutSeconds: 30
  # Optional. OpenAI embeddings key. Prefer secret.existingSecretName for production.
  openaiApiKey: ""
  openaiApiKeyFile: ""
  # Optional. Resource requests/limits for the Context Engine pod.
  resources: {}

# Sensitive environment secret settings.
secret:
  # Optional. Name of an existing Kubernetes Secret to consume with envFrom.
  # Recommended for production so sensitive values do not live in values.yaml or Helm release metadata.
  # If using an existing Secret, include JCA_WORKER_CLUSTER_TOKEN or generate one before install.
  # When set, this chart will not create its own Secret. The Secret should contain these keys as needed:
  # JCA_WORKER_ENROLLMENT_TOKEN, JCA_WORKER_CLUSTER_TOKEN, JCA_WORKER_DATABASE_URL,
  # JCA_WORKER_CONFIG_DB_URL, JCA_WORKER_AUDIT_DB_URL, JCA_WORKER_CODE_AUDIT_DB_URL,
  # JCA_WORKER_LIVE_DB_URL, JCA_WORKER_TRACE_DB_URL, JCA_WORKER_GATEWAY_DB_URL,
  # JCA_OPENAI_API_KEY,
  # JCA_ANTHROPIC_API_KEY, JCA_VERTEX_SERVICE_ACCOUNT_JSON, JCA_VERTEX_ACCESS_TOKEN,
  # AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, AWS_SESSION_TOKEN,
  # JCA_AZURE_FOUNDRY_API_KEY, AZURE_CLIENT_SECRET, JCA_AZURE_FOUNDRY_BEARER_TOKEN.
  existingSecretName: ""

# Worker Postgres settings. Enabled by default because self-hosted workers are production deployments.
# Disable only when worker.databaseUrl or secret.existingSecretName points at an external Postgres database.
postgres:
  # Optional. Deploy a dedicated Postgres database for this worker installation.
  enabled: true
  # Optional. Postgres image used by the chart-managed database.
  image: "postgres:16-alpine"
  # Optional. Database name.
  database: "mergeloom_worker"
  # Optional. Database username.
  username: "mergeloom_worker"
  # Required for production. Override this with a generated secret value.
  password: "change-me"
  # Optional. Persistent volume size.
  storage: "10Gi"
  # Optional. StorageClass name. Leave blank to use the cluster default.
  storageClassName: ""
  # Optional. Resource requests/limits for Postgres.
  resources: {}

# Optional AI provider credentials and model defaults.
# Leave unused providers blank. Sensitive values here are a quick-start fallback only.
# For production, prefer secret.existingSecretName with a Secret managed by your cluster secret workflow.
providerEnv:
  # Optional, sensitive. OpenAI API key for OpenAI-backed execution.
  openaiApiKey: ""
  # Optional. Default OpenAI model or profile.
  openaiModel: ""
  # Optional, sensitive. Anthropic API key for Anthropic-backed execution.
  anthropicApiKey: ""
  # Optional. Default Anthropic model or profile.
  anthropicModel: ""
  # Optional. Default Claude Code model.
  claudeCodeModel: ""
  # Optional. Vertex AI auth method: service_account_json, adc, or access_token.
  vertexAuthMethod: ""
  # Optional. Vertex AI endpoint mode: structured or raw-endpoint.
  vertexEndpointMode: ""
  # Optional. Vertex AI raw endpoint URL. Used only when vertexEndpointMode is raw-endpoint.
  vertexEndpointUrl: ""
  # Optional. Vertex AI project ID for structured publisher model paths.
  vertexProjectId: ""
  # Optional. Vertex AI location for structured publisher model paths.
  vertexLocation: ""
  # Optional. Vertex AI publisher for structured publisher model paths. Defaults to google in the worker.
  vertexPublisher: ""
  # Optional. Default Vertex AI model for structured publisher model paths.
  vertexModel: ""
  # Optional. ADC credential file path. Leave blank for GKE Workload Identity or metadata credentials.
  vertexCredentialsPath: ""
  # Optional, sensitive. Vertex AI service account JSON. Prefer secret.existingSecretName for production.
  vertexServiceAccountJson: ""
  # Optional, sensitive. Vertex AI access token. Advanced/testing only because tokens expire.
  vertexAccessToken: ""
  # Optional. AWS Bedrock auth method: default_chain, static_keys, or profile.
  bedrockAuthMethod: ""
  # Optional. AWS Bedrock region.
  bedrockRegion: ""
  # Optional. AWS Bedrock model ID.
  bedrockModelId: ""
  # Optional. Bedrock endpoint override for local sandboxes such as LocalStack.
  bedrockEndpointUrl: ""
  # Optional, sensitive. AWS access key ID for Bedrock.
  awsAccessKeyId: ""
  # Optional, sensitive. AWS secret access key for Bedrock.
  awsSecretAccessKey: ""
  # Optional, sensitive. AWS session token for temporary credentials.
  awsSessionToken: ""
  # Optional. AWS profile from mounted ~/.aws/config or ~/.aws/credentials.
  awsProfile: ""
  # Optional. Azure AI Foundry auth method: api_key, client_secret, managed_identity,
  # workload_identity, or bearer_token.
  azureFoundryAuthMethod: ""
  # Optional. Azure AI Foundry endpoint URL.
  azureFoundryEndpoint: ""
  # Optional, sensitive. Azure AI Foundry API key.
  azureFoundryApiKey: ""
  # Optional. Azure tenant ID for Entra service principal or workload identity auth.
  azureFoundryTenantId: ""
  # Optional. Azure client ID for service principal, managed identity, or workload identity auth.
  azureFoundryClientId: ""
  # Optional, sensitive. Azure client secret for Entra service-principal auth.
  azureFoundryClientSecret: ""
  # Optional. Azure federated token file path. Usually injected by AKS Workload Identity.
  azureFoundryFederatedTokenFile: ""
  # Optional, sensitive. Azure bearer token. Advanced/testing only because tokens expire.
  azureFoundryBearerToken: ""
  # Optional. Azure AI Foundry model/deployment name.
  azureFoundryModel: ""

# Persistent volume settings.
persistence:
  # Gateway state volume. Stores worker UI state, provider config, runtime config, and local state.
  gateway:
    # Optional. Enable persistent storage for gateway state. Recommended for production.
    enabled: true
    # Optional. Kubernetes PVC access mode when gateway persistence is enabled.
    accessMode: ReadWriteOnce
    # Optional. Requested gateway PVC storage size.
    size: 5Gi
    # Optional. StorageClass name. Leave blank to use the cluster default.
    storageClassName: ""
  # Executor workspace volume. Stores cloned repositories and job workspaces.
  workspaces:
    # Optional. Enable persistent storage for job workspaces. Recommended for production.
    enabled: true
    # Optional. Kubernetes PVC access mode when workspace persistence is enabled.
    accessMode: ReadWriteOnce
    # Optional. Requested storage size per executor replica.
    size: 10Gi
    # Optional. StorageClass name. Leave blank to use the cluster default.
    storageClassName: ""
  # Shared CLI auth/config volume. Stores Codex/Claude CLI auth state when used.
  cliConfig:
    # Optional. Enable persistent storage for CLI authentication/configuration. Recommended when using CLI auth.
    enabled: true
    # Optional. Kubernetes PVC access mode when CLI config persistence is enabled.
    accessMode: ReadWriteOnce
    # Optional. Requested CLI config PVC storage size.
    size: 1Gi
    # Optional. StorageClass name. Leave blank to use the cluster default.
    storageClassName: ""
  # Context Engine vault volume. Stores generated markdown vault documents.
  contextEngineVault:
    # Optional. Enable persistent storage for the Context Engine vault.
    enabled: true
    # Optional. Kubernetes PVC access mode when vault persistence is enabled.
    accessMode: ReadWriteOnce
    # Optional. Requested vault PVC storage size.
    size: 5Gi
    # Optional. StorageClass name. Leave blank to use the cluster default.
    storageClassName: ""

# Optional. Kubernetes resource requests/limits applied to both gateway and executor containers.
resources: {}

# Optional. Node selector applied to gateway and executor pods.
nodeSelector: {}

# Optional. Tolerations applied to gateway and executor pods.
tolerations: []

# Optional. Affinity rules applied to gateway and executor pods.
affinity: {}
