{{- if not .Values.secret.existingSecretName }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "jca-worker.envSecretName" . }}
  labels:
    {{- include "jca-worker.labels" . | nindent 4 }}
type: Opaque
stringData:
  JCA_WORKER_ENROLLMENT_TOKEN: {{ .Values.worker.enrollmentToken | quote }}
  JCA_WORKER_CLUSTER_TOKEN: {{ .Values.worker.clusterToken | quote }}
  JCA_OPENAI_API_KEY: {{ .Values.providerEnv.openaiApiKey | quote }}
  JCA_ANTHROPIC_API_KEY: {{ .Values.providerEnv.anthropicApiKey | quote }}
  JCA_VERTEX_ACCESS_TOKEN: {{ .Values.providerEnv.vertexAccessToken | quote }}
  AWS_ACCESS_KEY_ID: {{ .Values.providerEnv.awsAccessKeyId | quote }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.providerEnv.awsSecretAccessKey | quote }}
  AWS_SESSION_TOKEN: {{ .Values.providerEnv.awsSessionToken | quote }}
  JCA_AZURE_FOUNDRY_API_KEY: {{ .Values.providerEnv.azureFoundryApiKey | quote }}
{{- end }}
