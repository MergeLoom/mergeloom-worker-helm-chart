apiVersion: v1
kind: Service
metadata:
  name: {{ include "jca-worker.fullname" . }}-headless
  labels:
    {{- include "jca-worker.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    app.kubernetes.io/name: {{ include "jca-worker.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    component: executor
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
