{{- if .Values.contextEngine.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "jca-worker.contextEngineSecretName" . }}
  labels:
    {{- include "jca-worker.labels" . | nindent 4 }}
    component: context-engine
type: Opaque
stringData:
  internal-token: {{ include "jca-worker.contextEngineInternalToken" . | quote }}
  worker-token: {{ include "jca-worker.contextEngineWorkerToken" . | quote }}
  database-url: {{ include "jca-worker.contextEngineDatabaseUrl" . | quote }}
  openai-api-key: {{ .Values.contextEngine.openaiApiKey | quote }}
{{- end }}
